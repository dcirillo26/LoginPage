<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Wear login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
	<form action = "#" method = "post">
		<div class="contenitore">
			<p style="font-size: 160%; color: #800000;">
				<b>Accedi per comprare e vendere ciò che non usi più</b>
				</p>
			<div class="form-group">
				<input type="email" id="email" name="email"
					placeholder="Indirizzo email" required> <input type="password"
					id="password" name="password" placeholder="Password" required>
				<button type="submit">Login</button>
			</div>
			<p style="font-size: 122%">
				<b>Non hai un account? <a href="signIn.html">Registrati</a></b>
				</p>
		</div>
	</form>
</body>
</html>
